# Production/VM deploy — BACKEND ONLY (the frontend lives on Vercel).
#   * Public surface: ONLY Caddy on 80/443 (TLS), reverse-proxying the API.
#   * Auth is enforced in the API layer (email-login bearer token on every /api
#     route) — NOT a proxy gate — so the public Vercel frontend can call it after login.
#   * Postgres + backend bound to 127.0.0.1 — never reachable from the internet.
#   * Local Postgres container (no external DB).
#
#   docker compose -f docker-compose.prod.yml up --build -d
#
# Requires a .env at the repo root (LLM_* + TELEGRAM_BOT_TOKEN + AUTH_*).
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: yuno
      POSTGRES_PASSWORD: yuno
      POSTGRES_DB: yuno
    ports:
      - "127.0.0.1:5433:5432"   # localhost-only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yuno -d yuno"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    env_file:
      - .env          # LLM_* + TELEGRAM_BOT_TOKEN + AUTH_*
    environment:
      DATABASE_URL: postgresql+asyncpg://yuno:yuno@db:5432/yuno
      CHECKPOINT_DB_URI: postgresql://yuno:yuno@db:5432/yuno
      AUTH_ENABLED: "true"       # require the email-login bearer token on /api
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"   # localhost-only; reached publicly via Caddy
    restart: unless-stopped

  # TLS terminator. The ONLY service with public ports. Reverse-proxies the API
  # (REST + WebSocket + /docs). Auth is enforced inside the API, not here.
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
