# Production/VM deploy. The frontend (nginx) is fronted by Caddy for automatic
# HTTPS; nginx proxies /api (REST + WebSocket) + /docs to the backend over the
# compose network. The database is **Supabase** (managed Postgres) — there is no
# local db container here; the box .env supplies the connection strings:
#
#   DATABASE_URL=postgresql+asyncpg://postgres:<pwd>@db.<ref>.supabase.co:5432/postgres
#   CHECKPOINT_DB_URI=postgresql://postgres:<pwd>@db.<ref>.supabase.co:5432/postgres?sslmode=require
#
# Supabase's direct host is IPv6-only, so the compose network enables IPv6 (the
# daemon must have ipv6 + ip6tables; see /etc/docker/daemon.json on the box).
#
#   docker compose -f docker-compose.prod.yml up --build -d
services:
  backend:
    build: ./backend
    env_file:
      - .env          # DATABASE_URL + CHECKPOINT_DB_URI (Supabase) + LLM_* + TELEGRAM_BOT_TOKEN + AUTH_*
    ports:
      - "127.0.0.1:8000:8000"   # localhost-only; reached publicly via Caddy /api + /docs
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "80"          # served to Caddy over the compose network (no public port)
    depends_on:
      - backend
    restart: unless-stopped

  # TLS terminator: automatic HTTPS (Let's Encrypt) for the sslip.io domain,
  # reverse-proxying everything (static + /api + WebSocket + /docs) to nginx.
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    restart: unless-stopped

networks:
  default:
    enable_ipv6: true   # required to reach Supabase's IPv6-only direct host

volumes:
  caddy_data:
  caddy_config:
