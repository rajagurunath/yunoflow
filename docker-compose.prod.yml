# Production/VM deploy: frontend on :80, API on :8000, Postgres bound to
# localhost only (never internet-exposed). nginx in the frontend proxies
# /api (REST + WebSocket) to the backend over the compose network.
#
#   docker compose -f docker-compose.prod.yml up --build -d
#
# Requires a .env at the repo root (LLM_* and, optionally, TELEGRAM_BOT_TOKEN).
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: yuno
      POSTGRES_PASSWORD: yuno
      POSTGRES_DB: yuno
    ports:
      - "127.0.0.1:5433:5432"   # localhost-only; not reachable from the internet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yuno -d yuno"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://yuno:yuno@db:5432/yuno
      CHECKPOINT_DB_URI: postgresql://yuno:yuno@db:5432/yuno
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"   # localhost-only; reached publicly via Caddy /api + /docs
    restart: unless-stopped

  frontend:
    build: ./frontend
    expose:
      - "80"          # served to Caddy over the compose network (no public port)
    depends_on:
      - backend
    restart: unless-stopped

  # TLS terminator: automatic HTTPS (Let's Encrypt) for the sslip.io domain,
  # reverse-proxying everything (static + /api + WebSocket + /docs) to nginx.
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
