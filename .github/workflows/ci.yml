name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: yuno
          POSTGRES_PASSWORD: yuno
          POSTGRES_DB: yuno
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yuno -d yuno"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 15
    env:
      DATABASE_URL: postgresql+asyncpg://yuno:yuno@localhost:5432/yuno
      CHECKPOINT_DB_URI: postgresql://yuno:yuno@localhost:5432/yuno
      LLM_BASE_URL: https://example.invalid/v1
      LLM_API_KEY: test-key
      LLM_MODEL: gpt-4o-mini
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv python install 3.12
      - run: uv sync --extra dev
      - name: Lint (ruff)
        run: uv run --extra dev ruff check .
      - name: Migrate
        run: uv run alembic upgrade head
      - name: Tests (pytest)
        run: uv run --extra dev pytest -q

  frontend:
    name: Frontend (build + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Typecheck + build
        run: npm run build
      - name: Tests (vitest)
        run: npm test
